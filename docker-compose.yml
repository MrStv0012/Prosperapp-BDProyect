version: "3.9"

services:
  db:
    image: postgres:16
    container_name: prosperapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: prosperapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./database/ddl.sql:/docker-entrypoint-initdb.d/01_ddl.sql
      - ./database/dml.sql:/docker-entrypoint-initdb.d/02_dml.sql
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: prosperapp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@prosperapp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
